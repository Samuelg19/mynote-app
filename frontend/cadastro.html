<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#a855f7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="MyNote">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Criar conta - MyNote</title>

    <link rel="icon" type="image/png" href="assets/favicon.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="css/style.css" />
    <link rel="manifest" href="/manifest.json">
  </head>

  <body class="cadastro-body">
    <main class="cadastro-page">
      <div class="cadastro-header">
        <div class="cadastro-logo">
          <img src="assets/user.png" alt="Usuário" />
        </div>

        <h1>Criar conta</h1>
        <p>Preencha os dados para criar sua conta</p>
      </div>

      <section class="cadastro-card">
        <form id="formCadastro">
          <div class="social-cadastro">
            <button type="button" class="btn-social">
              <img src="assets/Google.png" class="social-icon-img" />
              Continuar com Google
            </button>

            <button id="btnAppleCadastro" type="button" class="btn-social">
              <img src="assets/Apple.png" class="social-icon-img apple" />
              Continuar com Apple
            </button>
          </div>

          <div class="divisor-cadastro">
            <span>ou cadastre-se com email</span>
          </div>

          <label for="nomeCadastro">Nome no app</label>
          <input
            type="text"
            id="nomeCadastro"
            placeholder="Como quer ser chamado?"
            autocomplete="nickname"
            required
          />

          <label for="emailCadastro">Email</label>
          <input
            type="email"
            id="emailCadastro"
            placeholder="seu@email.com"
            required
          />

          <label for="senhaCadastro">Senha</label>
          <input
            type="password"
            id="senhaCadastro"
            placeholder="••••••••"
            required
          />

          <label for="confirmarSenhaCadastro">Confirmar senha</label>
          <input
            type="password"
            id="confirmarSenhaCadastro"
            placeholder="••••••••"
            required
          />

          <button type="submit" class="btn-cadastro">Cadastrar</button>

          <p class="cadastro-login">
            Já tem uma conta?
            <a href="index.html">Fazer login</a>
          </p>
        </form>
      </section>

      <p class="cadastro-footer">
        Organize suas ideias de forma simples e tranquila
      </p>

      <button class="btn-ajuda" type="button">?</button>
    </main>

    <script src="js/app-preferences.js"></script>
    <script src="js/cadastro.js"></script>
    <script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker
      .register("/service-worker.js")
      .catch((erro) => console.warn("Service worker nao registrado:", erro));
  }
</script>
  </body>
</html>
